<!doctype html>
<head>
  <link
    rel="stylesheet"
    href="./typeToDo.css"
  />
</head>

<body class="body">
    <div class="panel">
        <h2 class="panel_titleText">제비의 TS ToDo</h2>
      <div class="panel__form">
        <input id="panel__todoInput" placeholder="할 일 입력">
        <button id="panel__button--add" type="button">추가</button>
      </div>
    <div class="ToDolist-Container">
        <div class="ToDolist-Container__list" id="todoList">
            <h3>할 일</h3>
        </div>
        <div class="ToDolist-Container__list" id="doneList">
          <h3>완료</h3>
        </div>
  </div>
  <script src="./dist/typeToDo.js"></script>
</body>
