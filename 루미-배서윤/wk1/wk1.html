<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>LUMI TODO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="todo">
  <h2>LUMI TODO</h2>

  <div class="input-area">
    <input type="text" id="todo-input" placeholder="할 일을 입력하세요">
    <button id="add-btn">할 일 추가</button>
  </div>

  <div class="list-area">
    <div class="todo-list">
      <h3>할 일</h3>
      <ul id="todo-list"></ul>
    </div>

    <div class="done-list">
      <h3>완료</h3>
      <ul id="done-list"></ul>
    </div>
  </div>

</div>

</body>
</html>
